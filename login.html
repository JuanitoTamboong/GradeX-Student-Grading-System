<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc">
    <title>GradeX - Sign In</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <!-- Left Side: Mascot Display -->
            <div class="login-left">
                <div class="mascot-container">
                    <!-- Floating Particles Background -->
                    <div class="particles-bg">
                        <div class="particle p1"></div>
                        <div class="particle p2"></div>
                        <div class="particle p3"></div>
                        <div class="particle p4"></div>
                        <div class="particle p5"></div>
                        <div class="particle p6"></div>
                        <div class="particle p7"></div>
                        <div class="particle p8"></div>
                    </div>
                    <img src="assets/gx-wave.png" alt="GradeX Anime Mascot" class="mascot-img mascot-wave">
                    <div class="speech-bubble" id="speechBubble">
                        <span id="greetingText"></span>
                    </div>
                </div>
            </div>

            <!-- Right Side: Form Content -->
            <div class="login-right">
                <div class="login-form-wrapper">
                    <!-- Header & Branding -->
                    <div class="login-header">
                        <div class="brand-logo">
                          <img src="./assets/GradeX-logo.png" alt="">
                            <span>GRADEX</span>
                        </div>
                        <h2>Welcome Back</h2>
                        <p class="subtitle">Please enter your credentials to log in.</p>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm" class="login-form">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" id="email" placeholder="Enter your email" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" id="password" placeholder="Enter your password" required>
                                <button type="button" id="passwordToggle" class="password-toggle" aria-label="Show password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="rememberMe">
                                <span class="custom-checkbox"></span>
                                Remember me
                            </label>
                            <a href="#" class="forgot-password">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn-login">
                            Sign In <i class="fas fa-arrow-right"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Set time-based greeting in speech bubble
        document.addEventListener('DOMContentLoaded', function() {
            const greetingEl = document.getElementById('greetingText');
            if (!greetingEl) return;
            
            const hour = new Date().getHours();
            let greeting = '';
            
            if (hour < 12) {
                greeting = '👋 Hello! Good Morning';
            } else if (hour < 17) {
                greeting = '👋 Hello! Good Afternoon';
            } else {
                greeting = '👋 Hello! Good Evening';
            }
            
            greetingEl.textContent = greeting;
        });
    </script>

    <script src="js/login.js"></script>
</body>
</html>
