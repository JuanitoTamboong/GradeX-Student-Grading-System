<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeX - Sign In</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loginPage" class="page active">
        <div class="login-container">
            <div class="login-left">
                <div class="login-shapes">
                    <div class="login-shape"></div>
                    <div class="login-shape"></div>
                    <div class="login-shape"></div>
                </div>
                <div class="login-branding">
                    <img src="assets/GradeX-logo.png" alt="GradeX Logo" class="login-logo" onerror="this.style.display='none'">
                    <h1 class="login-title">GradeX</h1>
                    <p class="login-subtitle">Student Grading System</p>
                    <p class="login-tagline">Smarter Grades. Faster Results.</p>
                </div>
                <div class="login-features">
                    <div class="login-feature">
                        <i class="fas fa-calculator"></i>
                        <span>Automatic Grade Computation</span>
                    </div>
                    <div class="login-feature">
                        <i class="fas fa-chart-line"></i>
                        <span>Performance Tracking</span>
                    </div>
                    <div class="login-feature">
                        <i class="fas fa-shield-alt"></i>
                        <span>Secure Role-Based Access</span>
                    </div>
                </div>
            </div>
            <div class="login-right">
                <div class="login-form-wrapper">
                    <div class="login-form-header">
                        <h2>Welcome Back</h2>
                        <p>Sign in to your account</p>
                    </div>
                    <form id="loginForm" class="login-form">
                        <div class="form-group">
                            <label for="email"><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" id="email" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label for="password"><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="password" placeholder="Enter your password" required>
                        </div>
                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="rememberMe">
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-password">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn-login">
                            <i class="fas fa-sign-in-alt"></i> Sign In
                        </button>
                    </form>
                    <div class="demo-accounts">
                        <p class="demo-title"><i class="fas fa-info-circle"></i> Demo Accounts</p>
                        <div class="demo-account" onclick="fillCredentials('admin@gradex.com', 'admin123')">
                            <span class="role-badge admin">Admin</span>
                            <span>admin@gradex.com</span>
                        </div>
                        <div class="demo-account" onclick="fillCredentials('teacher@gradex.com', 'teacher123')">
                            <span class="role-badge teacher">Teacher</span>
                            <span>teacher@gradex.com</span>
                        </div>
                        <div class="demo-account" onclick="fillCredentials('student@gradex.com', 'student123')">
                            <span class="role-badge student">Student</span>
                            <span>student@gradex.com</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/login.js"></script>
</body>
</html>
