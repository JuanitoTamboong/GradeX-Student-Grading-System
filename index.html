<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeX - Student Grading System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="launcher">
        <div class="launcher-bg">
            <div class="launcher-shape"></div>
            <div class="launcher-shape"></div>
            <div class="launcher-shape"></div>
        </div>
        <div class="launcher-content">
            <div class="launcher-brand">
                <img src="assets/GradeX-logo.png" alt="GradeX" class="launcher-logo" onerror="this.style.display='none'">
                <h1 class="launcher-title">GradeX</h1>
                <p class="launcher-subtitle">Student Grading System</p>
                <p class="launcher-tagline">Smarter Grades. Faster Results.</p>
            </div>
            <div class="launcher-nav">
                <a href="login.html" class="launcher-card login-card">
                    <div class="launcher-icon">
                        <i class="fas fa-sign-in-alt"></i>
                    </div>
                    <h3>Sign In</h3>
                    <p>Access your account with role-based authentication</p>
                    <span class="launcher-badge">Admin / Teacher / Student</span>
                </a>
                <a href="dashboard.html" class="launcher-card dashboard-card">
                    <div class="launcher-icon">
                        <i class="fas fa-th-large"></i>
                    </div>
                    <h3>Dashboard</h3>
                    <p>View grades, reports, and academic analytics</p>
                    <span class="launcher-badge">Requires Login</span>
                </a>
            </div>
            <div class="launcher-features">
                <div class="launcher-feature">
                    <i class="fas fa-calculator"></i>
                    <span>Auto-Computation</span>
                </div>
                <div class="launcher-feature">
                    <i class="fas fa-chart-line"></i>
                    <span>Analytics</span>
                </div>
                <div class="launcher-feature">
                    <i class="fas fa-shield-alt"></i>
                    <span>Secure Access</span>
                </div>
                <div class="launcher-feature">
                    <i class="fas fa-file-alt"></i>
                    <span>Reports</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
